name: Scheduled Data Refresh

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh datasets
        run: python scripts/refresh_data.py

      - name: Commit updated data snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): scheduled refresh of external datasets"
          file_pattern: data/processed/*.csv data/processed/*.json
